<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h5 class="card-title">{{ '::Movies' | abpLocalization }}</h5>
      </div>
      <div class="text-end col col-md-6">
        <button class="btn btn-primary" (click)="openModal()">
          <i class="fa fa-plus me-1"></i>
          {{ '::NewMovie' | abpLocalization }}
        </button>
      </div>
    </div>
  </div>

  <div class="card-body">
    <ngx-datatable [rows]="movies.items" [count]="movies.totalCount" [list]="list" default>
      <ngx-datatable-column name="Title" prop="title"></ngx-datatable-column>
      <ngx-datatable-column name="Genre">
        <ng-template let-row="row" ngx-datatable-cell-template>
          {{ getGenreLabel(row.genre) }}
        </ng-template>
      </ngx-datatable-column>
      <ngx-datatable-column name="Year" prop="yearOfRelease"></ngx-datatable-column>
      <ngx-datatable-column name="Price" prop="price"></ngx-datatable-column>
      <ngx-datatable-column name="Director" prop="directorName"></ngx-datatable-column>
      <ngx-datatable-column name="Actions">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <div ngbDropdown container="body" class="d-inline-block">
            <button class="btn btn-primary btn-sm dropdown-toggle" ngbDropdownToggle>
              {{ '::Actions' | abpLocalization }}
            </button>
            <div ngbDropdownMenu>
              <button ngbDropdownItem (click)="openModal(row)">
                {{ '::Edit' | abpLocalization }}
              </button>
              <button ngbDropdownItem (click)="delete(row.id)">Delete</button>
            </div>
          </div>
        </ng-template>
      </ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<abp-modal [(visible)]="isModalOpen">
  <ng-template #abpHeader>
    <h3>{{ (isEditMode ? '::Edit' : '::NewMovie') | abpLocalization }}</h3>
  </ng-template>

  <ng-template #abpBody>
    <form [formGroup]="form" id="movie-form">
      <div class="mb-3">
        <label for="title">{{ '::Title' | abpLocalization }}</label>
        <input id="title" formControlName="title" class="form-control" />
      </div>
      <div class="mb-3">
        <label for="genre">{{ '::Genre' | abpLocalization }}</label>
        <select id="genre" formControlName="genre" class="form-select">
          <option *ngFor="let g of genres" [value]="g.value">
            {{ g.key | abpLocalization }}
          </option>
        </select>
      </div>
      <div class="mb-3">
        <label for="yearOfRelease">{{ '::Year of Release' | abpLocalization }}</label>
        <input
          id="yearOfRelease"
          formControlName="yearOfRelease"
          type="number"
          class="form-control"
        />
      </div>
      <div class="mb-3">
        <label for="price">{{ '::Price' | abpLocalization }}</label>
        <input id="price" formControlName="price" type="number" class="form-control" />
      </div>
      <div class="mb-3">
        <label for="directorId">Director</label>
        <select id="directorId" formControlName="directorId" class="form-select">
          <option value="">-- Select Director --</option>
          <option *ngFor="let d of directors" [value]="d.id">{{ d.name }}</option>
        </select>
      </div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" #abpClose>
      {{ '::Close' | abpLocalization }}
    </button>
    <button type="button" class="btn btn-primary" (click)="save()">
      {{ '::Save' | abpLocalization }}
    </button>
  </ng-template>
</abp-modal>
