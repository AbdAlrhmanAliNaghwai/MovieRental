<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h5 class="card-title">Directors</h5>
      </div>
      <div class="text-end col col-md-6">
        <button class="btn btn-primary" (click)="openModal()">
          <i class="fa fa-plus me-1"></i>
          New Director
        </button>
      </div>
    </div>
  </div>

  <div class="card-body">
    <ngx-datatable [rows]="directors.items" [count]="directors.totalCount" [list]="list" default>
      <ngx-datatable-column name="Name" prop="name"></ngx-datatable-column>
      <ngx-datatable-column name="Nationality" prop="nationality"></ngx-datatable-column>
      <ngx-datatable-column name="Actions">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <div ngbDropdown container="body" class="d-inline-block">
            <button class="btn btn-primary btn-sm dropdown-toggle" ngbDropdownToggle>
              Actions
            </button>
            <div ngbDropdownMenu>
              <button ngbDropdownItem (click)="openModal(row)">Edit</button>
              <button ngbDropdownItem (click)="delete(row.id)">Delete</button>
            </div>
          </div>
        </ng-template>
      </ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<abp-modal [(visible)]="isModalOpen">
  <ng-template #abpHeader>
    <h3>{{ isEditMode ? 'Edit' : 'New' }} Director</h3>
  </ng-template>

  <ng-template #abpBody>
    <form [formGroup]="form" id="director-form">
      <div class="mb-3">
        <label for="name">Name</label>
        <input id="name" formControlName="name" class="form-control" />
      </div>
      <div class="mb-3">
        <label for="nationality">Nationality</label>
        <input id="nationality" formControlName="nationality" class="form-control" />
      </div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" #abpClose>Cancel</button>
    <button type="button" class="btn btn-primary" (click)="save()">Save</button>
  </ng-template>
</abp-modal>
